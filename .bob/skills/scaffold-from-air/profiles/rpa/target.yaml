# =============================================================================
# rpa — robotic process automation
# =============================================================================
# The only target where kind: actor is a first-class citizen: the actor is the
# person whose work is being automated, and their screen path IS the specification.
#
# Sub-target choice, decided here and not by the scaffold model:
#   robot-framework  RECOMMENDED. Plain text, diffable, and it ships its own
#                    offline validator (`robot --dryrun`) that resolves every
#                    keyword without executing anything.
#   uipath-coded     C# CodedWorkflow. Real source, validated by `dotnet build`.
#   uipath-xaml      NOT generated. Designer XAML carries visual layout metadata,
#                    is hostile to diff and merge, and an LLM writing it produces
#                    files that open broken in Studio.
#   automation-anywhere  NOT SUPPORTED. Bots ship as a JAR with a manifest and
#                    there is no publicly specified textual source format to
#                    generate. A specification for a human to transcribe is the
#                    honest deliverable.
# =============================================================================

id: rpa
name: "RPA — Robot Framework (recommended) and UiPath coded workflows"
version: 1
extends: null
status: documented

summary: >
  Automates a human's screen and API path: one suite per process, one keyword per
  step, selectors kept in a resource file so a UI change is one edit and not
  twenty. Refuses to host infrastructure, and refuses to generate designer XAML or
  Automation Anywhere bots rather than emitting files that open broken.

provenance:
  - "[DOC] `robot --dryrun` validates suite syntax, structure and the resolution of every keyword without executing anything; keywords that misbehave under dry run are tagged robot:no-dry-run."
  - "[DOC] UiPath coded workflows are C# partial classes deriving from CodedWorkflow in the UiPath.CodedWorkflows package, and interoperate with .xaml in both directions."
  - "[DOC] Power Automate Desktop supports copying selected actions out of the designer as text that pastes into another flow designer — one subflow at a time, and image-based elements may not survive."
  - "[NV] Neither `robot` nor `dotnet` is installed on this machine. No suite generated by this profile has been dry-run, and no C# has been compiled."
  - "[NV] No publicly specified textual source format was found for Automation Anywhere A360 bots; the JAR/manifest packaging is not a generation target."

# -----------------------------------------------------------------------------
capabilities:

  component_kinds:
    supports: [actor, ui, external, service, job, agent, tool]
    excludes:
      - feature: queue
        reason: "RPA orchestrates a user interface and APIs; it does not host a broker. A robot that owns the queue is a robot nobody can restart safely."
        workaround: "Let the orchestrator's own work queue handle it, or put the queue behind an HTTP endpoint the robot calls."
      - feature: topic
        reason: "Same as queue: nothing in a suite subscribes."
      - feature: cache
        reason: "There is no cache tier in a robot. A suite variable is not a cache, and calling it one hides that the value dies with the run."
      - feature: function
        reason: "Serverless has no representation in a suite. What a robot can do is CALL one."
        workaround: "Draw it as kind: external and it becomes an HTTP call."
      - feature: database
        reason: "Refused deliberately: a robot with direct database credentials bypasses every control the application it is automating enforces, which is the entire reason the process was manual."
        workaround: "Automate the application's own screen or API. If direct access really is intended, that is an integration project, not an RPA one."
      - feature: storage
        reason: "Object storage is not something a suite manages."
        workaround: "Use kind: external with an http connection, or a file connection for a shared folder."
      - feature: gateway
        reason: "No routing tier in a robot."
      - feature: knowledge_base
        reason: "No retrieval corpus artifact on this target."

  protocols:
    supports: [http, https, file, internal]
    excludes:
      - feature: kafka
        reason: "No broker client in a suite, and a robot cannot hold a consumer group between runs."
        workaround: "Have a service consume and expose the result over HTTP."
      - feature: amqp
        reason: "Same as kafka: no broker client in a suite, and message ordering across robot runs is not something a suite can promise."
      - feature: grpc
        reason: "No gRPC keyword library this profile will assume."
        workaround: "Front it with HTTP."
      - feature: mqtt
        reason: "Device telemetry is not a robot's job."
      - feature: sql
        reason: "Consistent with refusing kind: database — a robot issuing SQL sidesteps the controls of the system it is supposed to be using."
        workaround: "Drive the application instead."
      - feature: jdbc
        reason: "Same as sql: a robot holding database credentials bypasses the controls of the application it is automating."
      - feature: s3
        reason: "Object storage access is not part of the suite contract."
      - feature: websocket
        reason: "No socket handling in a keyword-driven suite."
      - feature: graphql
        reason: "No native library assumed; query construction inside a robot is a maintenance trap."
        workaround: "Call the REST equivalent with RequestsLibrary."
      - feature: external_chat
        reason: "A conversational hand-off is not something a robot performs."

  sync_modes:
    supports: [sync]
    excludes:
      - feature: async
        reason: "A suite runs its steps in order. Fire-and-forget is expressible only as 'start it and check later', which is two separate robot runs, not one asynchronous edge."
        workaround: "Split into two processes: one that submits, one that polls. Draw them as two jobs."

  boundary_kinds:
    supports: [logical, external_system, onprem]
    excludes:
      - feature: vpc
        reason: "Network topology is not a suite concept."
      - feature: namespace
        reason: "No namespace object in a robot project."
      - feature: cluster
        reason: "Where the robot runs is the orchestrator's placement decision."
      - feature: zone
        reason: "Not expressible in a suite."
      - feature: cloud
        reason: "Placement is an orchestrator concern."
      - feature: dmz
        reason: "Network zoning is not a suite artifact."
      - feature: account
        reason: "Tenancy belongs to the orchestrator's configuration."

  nonfunctional_honored: [security]

# -----------------------------------------------------------------------------
artifacts:

  - for_kind: actor
    path: "tests/{id}_process.robot"
    format: robot
    evidence: "[DOC] Robot Framework suite structure: Settings, Variables, Test Cases (or Tasks), Keywords."
    schema_facts:
      - "The actor is the process. Their steps become the Tasks section, in the order they perform them."
      - "Sections are *** Settings ***, *** Variables ***, *** Tasks *** (or *** Test Cases ***) and *** Keywords ***."
      - "Every keyword the suite calls has to be importable, because `robot --dryrun` resolves all of them — an undefined keyword fails the gate rather than failing in production at 3 a.m."
      - "A keyword that cannot survive dry run is tagged robot:no-dry-run, and each of those tags is a spot where the gate stops covering you."
    must_not:
      - "Never inline a selector in a task step. Selectors go in a resource file; a UI change should be one edit, not twenty."
      - "Never put a credential in a variable file. Use the orchestrator's credential store."
      - "Never write a Sleep with a magic number where a Wait Until keyword exists. Sleep is how a suite becomes flaky on somebody else's slower machine."

  - for_kind: ui
    path: "resources/{id}_selectors.resource"
    format: robot
    evidence: "[DOC] .resource files hold shared keywords and variables imported through the Settings section."
    schema_facts:
      - "One resource file per target application. Selectors are variables; the keywords that use them are the application's vocabulary ('Open Order Screen', not 'Click //div[3]')."
    must_not:
      - "Never generate a selector for a screen the drawing did not show. An invented XPath is a robot that clicks the wrong thing in a live system."

  - for_kind: external
    path: "resources/{id}_api.resource"
    format: robot
    evidence: "[DOC] RequestsLibrary is the standard Robot Framework HTTP client."

  - for_kind: service
    path: "resources/{id}_api.resource"
    format: robot
    evidence: "[INF] Profile mapping: a service in an RPA drawing is something the robot calls, which is an API keyword file."

  - for_kind: job
    path: "tasks/{id}.robot"
    format: robot
    evidence: "[INF] Profile mapping: a scheduled unattended process is a task suite; the schedule itself belongs to the orchestrator."

  - for_kind: agent
    path: "resources/{id}_agent.resource"
    format: robot
    evidence: "[INF] Profile mapping: an agent in an RPA drawing is a decision the robot delegates over HTTP. Generating the agent itself is the orchestrate-adk or langgraph profile's job."

  - for_kind: tool
    path: "libraries/{id}.py"
    format: python
    evidence: "[DOC] Robot Framework keyword libraries are ordinary Python modules; public methods become keywords."

  - for_kind: project
    path: "README.md"
    format: markdown
    evidence: "[INF] States which application versions the selectors were written against — the fact that decides whether this suite still runs next quarter."

# -----------------------------------------------------------------------------
parameters:
  - title: "RPA platform"
    required: [sub_target]
    properties:
      sub_target:
        type: string
        enum: [robot-framework, uipath-coded]
        default: robot-framework
        description: "robot-framework is recommended: plain text, diffable, and it brings its own offline validator. uipath-coded is C# and needs dotnet."
  - title: "Attended or unattended"
    advanced: true
    properties:
      run_mode: {type: string, enum: [attended, unattended], default: unattended}

inference_rules:
  - {param: sub_target, from: "experiment_plan.stack.rpa_platform", when_absent: default, default: "robot-framework"}
  - {param: output_language, from: "meta.output_language", when_absent: default, default: "en"}

questions:
  - id: q_target_applications
    param: target_applications
    when: {has_component_kind: ui}
    question: "Which applications does the robot drive, and in which versions? Web, desktop or terminal?"
    blocking: true
    why: "Selector strategy is completely different per surface, and a suite written for the wrong one is a rewrite, not a fix."
  - id: q_process_steps
    param: process_steps
    when: {has_component_kind: actor}
    question: "What are the person's steps, in order, including what they do when something goes wrong?"
    blocking: true
    why: "The happy path is what gets drawn; the exception path is what the robot spends its life in. Generating only the happy path produces a robot that stops at the first surprise and leaves a half-finished transaction."
  - id: q_credentials
    param: credential_store
    when: {always: true}
    question: "Where do the robot's credentials come from — the orchestrator's credential store, or a vault?"
    options: ["orchestrator credential store", "external vault", "not decided yet"]
    blocking: true
    why: "This is the one question whose wrong answer ends up as a password in a versioned file."
  - id: q_idempotency
    param: rerun_policy
    when: {has_component_kind: actor}
    question: "If the robot dies halfway through, is re-running it safe, or does it duplicate work?"
    options: ["safe to re-run", "duplicates — needs a check step first", "unknown"]
    blocking: false
    why: "An RPA process that is not re-runnable creates duplicate records on every retry, and nobody notices until reconciliation."

phases:
  analyze: inherit
  plan: inherit
  scaffold: override
  validate: decorate

bob_modes:
  scaffold: {slug: arch-scaffold, approval_mode: yolo, cwd: "{project_root}"}
  validate: {slug: arch-validator, approval_mode: auto_edit, cwd: "{project_root}"}

templates: null

validate:
  level: structural-only
  level_reason: >
    `robot --dryrun` is a genuine offline gate and would make this target `full`,
    but Robot Framework is not installed on this machine, so nothing generated
    here has been dry-run. The level is what is true today, not what is true after
    a pip install.
  checks:
    - name: robot-dryrun
      cmd: "robot --dryrun --outputdir /tmp/arch2code-robot ."
      requires: [{binary: robot}]
      confidence: "[DOC] Validates suite syntax, structure and the resolution of every keyword without executing anything."
      degrade: "robot is NOT installed here, so undefined keywords and broken imports are not caught. `pip install robotframework` turns this target's validation level to full."
      blocking: true
    - name: robot-structure
      cmd: "python3 {skill_root}/scripts/check_robot_structure.py {files:**/*.robot}"
      requires: [{binary: python3}]
      confidence: "[INF] A grammar written here: known section headers, no inline selector literals in task steps, no Sleep with a magic number, no credential-looking literals."
      degrade: "Not applicable — stdlib only."
      blocking: true
    - name: py-syntax
      cmd: "python3 -m py_compile {files:libraries/*.py}"
      requires: [{binary: python3}]
      confidence: "[VER] py_compile is stdlib."
      degrade: "No Python interpreter: keyword libraries are not parsed."
      blocking: true
    - name: dotnet-build
      cmd: "dotnet build --no-restore"
      requires: [{binary: dotnet}]
      confidence: "[DOC] The documented validation for UiPath coded workflows."
      degrade: "dotnet is NOT installed here. If sub_target is uipath-coded, the generated C# is shipped uncompiled — treat it as a draft for a developer, not as a deliverable."
      blocking: false
