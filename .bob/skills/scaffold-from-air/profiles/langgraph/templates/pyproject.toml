# arch2code: generated from AIR {{run_id}} :: {{component_id}}
# source: {{source_artifact}}  evidence: {{evidence}}
# DO NOT EDIT BY HAND — regenerate via the arch-scaffold mode
#
# The manifest declares dependencies: ["."] — the local project is installed, so
# it needs a real package definition. List ONLY what the code imports; langgraph
# build fails to resolve a phantom package, and a missing one fails at import.
#   requires-python matches the manifest's python_version.
#
# [DOC] PEP 621 [project] table; the extra dependency ids are LangChain/LangGraph
# package names from documentation. langgraph is not installed here.

[project]
name = "{{project_slug}}"
version = "0.1.0"
description = "LangGraph application generated by arch2code from AIR {{run_id}}."
requires-python = ">={{python_version}}"
dependencies = [
    # Always: the framework and its core.
    "langgraph",
    "langchain",
    "langchain-core",
    # Provider for the architectural default model groq/openai/gpt-oss-120b.
    "langchain-groq",
    # Tools that call HTTP endpoints (src/tools/*.py, src/nodes/*.py).
    "requests",
    # --- add ONLY when the drawing uses them; delete the rest ----------------
    # "langgraph-checkpoint-postgres",  # checkpointer=postgres in src/checkpointer.py
    # "langgraph-checkpoint-sqlite",    # checkpointer=sqlite
    # "ragas",                          # eval/ragas/evaluate_rag.py (RAG present)
    # "datasets",                       # ragas dataset construction
    # "langfuse",                       # eval/observability.py, OBSERVABILITY=langfuse
    # "langchain-openai",               # a fallback / judge model on OpenAI
    # "langchain-anthropic",            # a fallback / judge model on Anthropic
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

# The graph, node, tool, llm, eval and governance code live in top-level packages
# (src/, llm/, eval/, governance/). Tell setuptools to include them so
# dependencies: ["."] installs importable modules.
[tool.setuptools]
packages = ["src", "src.nodes", "src.graphs", "src.tools", "llm", "eval", "governance"]
